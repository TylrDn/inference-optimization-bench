name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install lint deps
        run: pip install ruff mypy pyyaml python-dotenv httpx
      - name: Lint
        run: ruff check .
      - name: Type check
        run: mypy . --ignore-missing-imports --explicit-package-bases

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install test deps
        run: pip install pytest pytest-cov pyyaml python-dotenv httpx
      - name: Run tests
        run: pytest tests/ -v --cov=bench --cov-report=term-missing
